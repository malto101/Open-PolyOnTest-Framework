# PolyTest host Rust example
#
#   cargo build -p polytest-host-rust --no-default-features --features cobs
#   cargo run -p open-polytest -- run --target host --config examples/host_rust/polytest.toml

[target.host]
board = "host"
transport = "stdio"
codec = "cobs"
mode = "stream"
reporters = ["console", "junit", "json"]
binary = "target/debug/host_rust_tests"
timeout_ms = 10000
